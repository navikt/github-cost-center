apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: github-cost-dashboard
  namespace: appsec
  labels:
    team: appsec
spec:
  image: {{image}}
  port: 8080
  replicas:
    min: 1
    max: 1
  ingresses:
    - https://github-cost-dashboard.ansatt.nav.no
  azure:
    application:
      enabled: true
      allowAllUsers: true
    sidecar:
      enabled: true
      autoLogin: true
  gcp:
    buckets:
      - name: nav-github-cost-dashboard-appsec  # must be globally unique
        cascadingDelete: true
  env:
    - name: GCS_BUCKET_NAME
      value: nav-github-cost-dashboard-appsec
    - name: WHODIS_BASE_URL
      value: http://whodis.appsec
    - name: BQ_PROJECT
      value: styring-av-sky-prod-77f0
    - name: GITHUB_ORG
      value: navikt
  accessPolicy:
    outbound:
      rules:
        - application: whodis
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 320Mi
  liveness:
    path: /health
  readiness:
    path: /health
